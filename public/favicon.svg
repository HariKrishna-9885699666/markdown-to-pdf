<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)" />
  <!-- Document body -->
  <rect x="12" y="8" width="28" height="36" rx="3" fill="white" opacity="0.95"/>
  <!-- Folded corner -->
  <polygon points="32,8 40,8 40,16" fill="#c4b5fd"/>
  <rect x="32" y="8" width="8" height="8" rx="1" fill="#a78bfa"/>
  <!-- MD text lines (representing markdown) -->
  <rect x="16" y="18" width="18" height="2.5" rx="1" fill="#6366f1"/>
  <rect x="16" y="23" width="14" height="2.5" rx="1" fill="#8b5cf6"/>
  <rect x="16" y="28" width="16" height="2.5" rx="1" fill="#6366f1"/>
  <!-- PDF arrow icon at bottom right -->
  <circle cx="46" cy="48" r="13" fill="#4f46e5"/>
  <!-- Arrow right -->
  <polyline points="40,48 50,48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="46,43 51,48 46,53" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
